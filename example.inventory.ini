[rpi]
# Replace with your Raspberry Pi's IP address or hostname
# raspberrypi ansible_host=192.168.1.100 ansible_user=pi

# If running locally on the Pi itself, uncomment the following:
# localhost ansible_connection=local ansible_user=pi

[rpi:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
# Optional: Add passwords here (less secure, consider using --ask-pass or Ansible Vault instead)
# ansible_ssh_pass=your_ssh_password
# ansible_become_pass=your_sudo_password
