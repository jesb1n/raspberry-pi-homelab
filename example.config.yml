---
# SSH Key Configuration
ssh_key_setup_enable: true
ssh_public_key: "~/.ssh/id_rsa.pub"  # Path to your public SSH key
ssh_authorized_keys_user: "pi"  # User to add SSH key for

# Initial Setup Configuration
initial_setup_enable: true
update_packages: true  # Update apt cache (fast, idempotent)
upgrade_packages: false  # Set to true to upgrade all packages (slow, only needed on initial setup)
install_essential_packages: true

essential_packages:
  - vim
  - git
  - curl
  - wget
  - htop
  - ufw

# Docker Installation Configuration
docker_install_enable: true
docker_user: "pi"  # User to add to docker group (defaults to ssh_authorized_keys_user)

# Tailscale Installation Configuration
tailscale_install_enable: true
tailscale_subnet_routes:
  - "10.0.0.0/24"  # Subnet routes to advertise
  - "192.168.1.0/24"
tailscale_enable_exit_node: true  # Enable this device as an exit node
tailscale_enable_ssh: true  # Enable SSH access via Tailscale

# Configuration directory (where Docker compose files will be stored)
config_dir: "~"
