---
# SSH Key Setup Tasks
- name: Check if SSH public key exists locally
  stat:
    path: "{{ ssh_public_key | expanduser }}"
  register: ssh_key_file
  delegate_to: localhost
  become: no
  when: ssh_key_setup_enable | default(true)

- name: Fail if SSH public key does not exist
  fail:
    msg: "SSH public key not found at {{ ssh_public_key }}. Please generate one with 'ssh-keygen -t rsa -b 4096' or update ssh_public_key in config.yml"
  when:
    - ssh_key_setup_enable | default(true)
    - not ssh_key_file.stat.exists

- name: Read SSH public key
  slurp:
    src: "{{ ssh_public_key | expanduser }}"
  register: ssh_key_content
  delegate_to: localhost
  become: no
  when:
    - ssh_key_setup_enable | default(true)
    - ssh_key_file.stat.exists

- name: Ensure .ssh directory exists
  file:
    path: "/home/{{ ssh_authorized_keys_user }}/.ssh"
    state: directory
    mode: '0700'
    owner: "{{ ssh_authorized_keys_user }}"
    group: "{{ ssh_authorized_keys_user }}"
  when: ssh_key_setup_enable | default(true)

- name: Add SSH public key to authorized_keys
  authorized_key:
    user: "{{ ssh_authorized_keys_user }}"
    state: present
    key: "{{ ssh_key_content.content | b64decode | trim }}"
    comment: "Ansible managed key"
  when: ssh_key_setup_enable | default(true)

- name: Ensure authorized_keys has correct permissions
  file:
    path: "/home/{{ ssh_authorized_keys_user }}/.ssh/authorized_keys"
    mode: '0600'
    owner: "{{ ssh_authorized_keys_user }}"
    group: "{{ ssh_authorized_keys_user }}"
  when: ssh_key_setup_enable | default(true)
